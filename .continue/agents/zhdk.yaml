name: Spark
version: 1.0.0
schema: v1
models:
  - name: Qwen3-Coder-Next
    provider: openai
    model: Qwen/Qwen3-Coder-Next-FP8
    apiBase: http://brian3.byod.zhdk.ch:8000/v1
    apiKey: NONE
    roles: [chat, edit, apply]
    capabilities: [tool_use]
    defaultCompletionOptions:
      contextLength: 131072
      maxTokens: 16384
      temperature: 0.7
      topP: 0.8
    requestOptions:
      extraBodyProperties:
        top_k: 20

context:
  - provider: code
  - provider: diff
  - provider: codebase
  - provider: currentFile
  - provider: terminal
  - provider: url